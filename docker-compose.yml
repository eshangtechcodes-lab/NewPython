version: '3.8'

services:
  api:
    build: .
    container_name: eshang-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DEBUG=False
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:8080/health',timeout=5); exit(0 if r.status_code==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - eshang-net

  # Redis（如需独立部署取消注释）
  # redis:
  #   image: redis:7-alpine
  #   container_name: eshang-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - eshang-net

networks:
  eshang-net:
    driver: bridge

